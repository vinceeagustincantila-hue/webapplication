<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity 1 - MapQuest Route Finder</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px;
           margin: 30px auto; padding: 0 20px; }
    h1 { color: #1a3c6e; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 24px; background: #1a3c6e; color: #fff;
             border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:hover { background: #0c2a52; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background: #1a3c6e; color: white; padding: 10px; text-align: left; }
    td { padding: 9px 10px; border-bottom: 1px solid #eee; }
    tr:nth-child(even) { background: #f5f8ff; }
    .section-title { font-weight: bold; margin-top: 20px; color: #1a3c6e; }
    .error { color: red; margin-top: 10px; }
    #history-section { margin-top: 40px; }
  </style>
</head>
<body>

<h1>MapQuest Route Finder</h1>
<p>Activity 1 — API Key Authentication | NMSC Student</p>
<hr>

<div class="form-group">
  <label for="apiKey">MapQuest API Key:</label>
  <input type="password" id="apiKey" placeholder="Paste your API key here">
</div>
<div class="form-group">
  <label for="fromLoc">Starting Location:</label>
  <input type="text" id="fromLoc" placeholder="e.g. Tangub City, Misamis Occidental">
</div>
<div class="form-group">
  <label for="toLoc">Destination:</label>
  <input type="text" id="toLoc" placeholder="e.g. Ozamiz City, Misamis Occidental">
</div>
<button onclick="getRoute()">Get Route</button>
<div id="error" class="error"></div>

<div id="result"></div>

<div id="history-section">
  <h2>Execution History</h2>
  <table id="historyTable">
    <thead>
      <tr>
        <th>Run #</th><th>From</th><th>To</th>
        <th>Distance</th><th>Duration</th>
        <th>Status</th><th>Time</th>
      </tr>
    </thead>
    <tbody id="historyBody">
      <tr><td colspan="7" style="color:#999">No runs yet.</td></tr>
    </tbody>
  </table>
</div>

<script>
let runCount = 0;

function formatTime(s) {
  if (!s && s !== 0) return 'N/A';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? h + 'h ' + m + 'm' : m + ' min';
}

async function getRoute() {
  const key = document.getElementById('apiKey').value.trim();
  const from = document.getElementById('fromLoc').value.trim();
  const to = document.getElementById('toLoc').value.trim();
  document.getElementById('error').textContent = '';
  document.getElementById('result').innerHTML = '';

  if (!key || !from || !to) {
    document.getElementById('error').textContent = 'Please fill in all fields.';
    return;
  }

  const url = 'https://www.mapquestapi.com/directions/v2/route?key='
    + encodeURIComponent(key)
    + '&from=' + encodeURIComponent(from)
    + '&to=' + encodeURIComponent(to)
    + '&outFormat=json&ambiguities=ignore';

  try {
    const res = await fetch(url);
    const data = await res.json();
    const code = data.info.statuscode;

    if (code !== 0) {
      const msg = data.info.messages[0] || 'Error from API.';
      document.getElementById('error').textContent = 'Error ' + code + ': ' + msg;
      addHistory(from, to, '-', '-', 'Error ' + code);
      return;
    }

    const route = data.route;
    runCount++;
    const dist = (route.distance ? route.distance.toFixed(2) : 'N/A') + ' mi';
    const dur = formatTime(route.time);
    addHistory(from, to, dist, dur, 'Success');

    let html = '<p class="section-title">Route Summary</p>';
    html += '<table><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>';
    html += '<tr><td>From</td><td>' + from + '</td></tr>';
    html += '<tr><td>To</td><td>' + to + '</td></tr>';
    html += '<tr><td>Distance</td><td>' + dist + '</td></tr>';
    html += '<tr><td>Duration</td><td>' + dur + '</td></tr>';
    html += '<tr><td>Fuel Used</td><td>' + (route.fuelUsed ? route.fuelUsed.toFixed(3) : 'N/A') + ' gal</td></tr>';
    html += '<tr><td>Status Code</td><td>' + code + ' (Success)</td></tr>';
    html += '</tbody></table>';

    html += '<p class="section-title" style="margin-top:20px">Turn-by-Turn Directions</p>';
    html += '<table><thead><tr><th>#</th><th>Instruction</th><th>Street</th><th>Distance</th></tr></thead><tbody>';
    let step = 1;
    route.legs.forEach(leg => {
      leg.maneuvers.forEach(m => {
        html += '<tr><td>' + step++ + '</td><td>' + m.narrative
          + '</td><td>' + (m.streets[0]||'-')
          + '</td><td>' + (m.distance ? m.distance.toFixed(2) : 'N/A') + ' mi</td></tr>';
      });
    });
    html += '</tbody></table>';
    document.getElementById('result').innerHTML = html;

  } catch(e) {
    document.getElementById('error').textContent = 'Network error: ' + e.message;
    addHistory(from, to, '-', '-', 'Network Error');
  }
}

function addHistory(from, to, dist, dur, status) {
  const tbody = document.getElementById('historyBody');
  if (tbody.rows[0] && tbody.rows[0].cells[0].colSpan === 7)
    tbody.innerHTML = '';
  runCount = runCount || (tbody.rows.length + 1);
  const now = new Date().toLocaleTimeString();
  tbody.innerHTML += '<tr><td>' + (tbody.rows.length+1)
    + '</td><td>' + from + '</td><td>' + to
    + '</td><td>' + dist + '</td><td>' + dur
    + '</td><td>' + status + '</td><td>' + now + '</td></tr>';
}
</script>
</body>
</html>
